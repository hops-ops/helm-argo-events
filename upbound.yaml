apiVersion: meta.dev.upbound.io/v2alpha1
kind: Project
metadata:
  name: helm-argo-events
spec:
  dependsOn:
  - apiVersion: pkg.crossplane.io/v1
    kind: Provider
    package: xpkg.crossplane.io/crossplane-contrib/provider-helm
    version: ">=v1"
  - apiVersion: pkg.crossplane.io/v1
    kind: Function
    package: xpkg.crossplane.io/crossplane-contrib/function-auto-ready
    version: '>=v0.6.0'
  description: Installs the Argo Events Helm chart for event-driven workflow automation.
  license: Apache-2.0
  maintainer: Patrick Lee Scott <pat@patscott.io>
  readme: |
    # helm-argo-events

    Installs the Argo Events Helm chart using Crossplane and the Helm provider.
    Argo Events is an event-driven workflow automation framework for Kubernetes.
  repository: ghcr.io/hops-ops/helm-argo-events
  source: github.com/hops-ops/helm-argo-events
